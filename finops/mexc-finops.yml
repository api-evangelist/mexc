specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: MEXC
providerId: mexc
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Cryptocurrency
  - Exchange
  - Trading
description: 'FOCUS-aligned FinOps for MEXC: API connectivity is free; cost is incurred as
  per-transaction maker/taker fees for spot and futures trading. Spot trading charges 0% maker
  and 0.05% taker fees for standard accounts. API Futures trading (launched March 31, 2026) carries
  a separate, higher fee schedule — 0.06% maker and 0.08% taker as of June 1, 2026 — that
  supersedes any web/app promotional rates. MX token holdings and the Market Maker Program provide
  fee reduction and rebate paths. Brokers receive revenue-share rebates on sub-account trading volume.'
sources:
  - https://www.mexc.com/mexc-api
  - https://mexcdevelop.github.io/apidocs/spot_v3_en/
  - https://www.mexc.com/announcements/article/introducing-api-futures-trading-on-mar-31-2026-17827791534551
  - https://www.mexc.com/announcements/article/updates-to-api-futures-trading-fees-jun-1-2026-17827791535742
  - https://www.mexc.com/learn/article/how-to-become-a-market-maker-on-mexc-/1
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: MEXC Global
serviceCategory: Financial Services / Trading
billingModel:
  pricingCategory: Take Rate (Per Trade) + Optional Token Discount + Market Maker Rebate
  billingFrequency: Continuous Settlement (per trade)
  billingCurrency: USD (settlement in traded assets or MX token for fee payment)
  chargeCategories:
    - Usage
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: MEXC
  ServiceCategory: Financial Services
  ProviderName: MEXC Global
  PublisherName: MEXC Global
  InvoiceIssuerName: MEXC Global
  BillingCurrency: USD
